# ─────────────────────────────────────────────────────────────
# RaisedCurious — Nightly content pipeline
# Runs 1am ET (6am UTC). Generates content via Claude API,
# integrates it into live site data files, commits, pushes.
# Netlify auto-deploys on push.
#
# Weekly cadence (driven by day-of-week logic in generate.js):
#   Mon → new experiment     → merged into js/experiments-data.js
#   Tue → weekend checklist  → merged into data/weekend-lists.json
#   Wed → social posts       → staged in data/social-posts.json
#   Thu → new printable      → merged into data/printables.json
#   Fri → newsletter draft   → staged in data/newsletters.json
#   Sat → outdoor guide      → merged into data/outside-guides.json
#   Sun → weekly summary     → appended to data/CHANGELOG.md
# ─────────────────────────────────────────────────────────────
name: Nightly Content

on:
  schedule:
    - cron: '0 6 * * *'   # 1am ET (6am UTC) daily
  workflow_dispatch:       # manual trigger from Actions tab for testing

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: |
          # Use lockfile if present for reproducibility, otherwise plain install
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi
          # Ensure Anthropic SDK is available — install if not already in node_modules
          node -e "require('@anthropic-ai/sdk')" 2>/dev/null || npm install --no-save @anthropic-ai/sdk

      - name: Generate content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -f scripts/generate.js ]; then
            node scripts/generate.js
          else
            echo "scripts/generate.js not found — skipping generation step"
          fi

      - name: Integrate new content into live site
        run: |
          if [ -f scripts/integrate.js ]; then
            node scripts/integrate.js
          else
            echo "scripts/integrate.js not found — skipping integration step"
          fi

      - name: Commit & push
        run: |
          git config user.name "RaisedCurious Bot"
          git config user.email "bot@raisedcurious.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit — skipping push."
          else
            DAY=$(date -u +%A)
            git commit -m "Nightly: ${DAY} content update"
            git push origin main
            echo "Pushed nightly ${DAY} update. Netlify will deploy."
          fi

      - name: Trigger Netlify deploy (belt-and-suspenders)
        if: success()
        run: |
          if [ -n "${{ secrets.NETLIFY_HOOK_URL }}" ]; then
            curl -X POST -d '{}' "${{ secrets.NETLIFY_HOOK_URL }}" || echo "Netlify hook failed (non-fatal)"
          fi
